<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #e8efff, #cfd9ff);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            width: 360px;
            background: white;
            padding: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            border-radius: 10px;
        }
        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #3a4bff;
        }
        input {
            width: 90%;
            padding: 11px;
            margin: 8px 0;
            border: 1px solid #b4c3ff;
            border-radius: 6px;
            font-size: 14px;
        }
        button {
            width: 100%;
            padding: 11px;
            background: #3a4bff;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            background: #2e3bcc;
        }
        a {
            text-decoration: none;
            color: #3a4bff;
            font-weight: bold;
            display: block;
            text-align: center;
            margin-top: 12px;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>Forgot Password</h2>

    <form method="POST">
        {% csrf_token %}
        <input type="email" name="email" placeholder="Enter Registered Email" required>
        <button type="submit">Verify Email</button>
    </form>

    <a href="{% url 'login' %}">Back to Login</a>
</div>

{% if error %}
<script>
    alert("{{ error }}");
</script>
{% endif %}

</body>
</html>
